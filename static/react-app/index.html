<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React REST Demo</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f3f4f6; color: #111827; }
    .page { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 520px; background: #ffffff; border-radius: 18px; box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08); padding: 28px; }
    .card h1 { margin: 0 0 18px; font-size: 1.75rem; letter-spacing: -0.03em; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-size: 0.95rem; color: #374151; }
    .field input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 12px; font-size: 1rem; }
    .button { width: 100%; padding: 12px 16px; border: none; border-radius: 12px; background: #2563eb; color: white; font-size: 1rem; cursor: pointer; }
    .button:disabled { opacity: 0.7; cursor: not-allowed; }
    .status { margin-top: 18px; font-size: 0.95rem; line-height: 1.6; }
    .status.success { color: #065f46; }
    .status.error { color: #b91c1c; }
    .code { margin-top: 12px; padding: 14px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 0.92rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div id="root"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
