upstream django_backend {
    server web:8000;
}

upstream vite_frontend {
    server host.docker.internal:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://code.jquery.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: https://nominatim.openstreetmap.org; frame-src 'self' https://www.openstreetmap.org; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # STATIC
    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }

    # FAVICON FIX
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # DJANGO
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/accounts/(login|signup|verify-email|profile)/?$ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $http_host;
    }

    location /accounts/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
    }

    location = /venues {
        return 301 /venues/;
    }

    location ~ ^/venues/dashboard/[0-9]+/?$ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $http_host;
    }

    location /venues/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # REACT SPA
    location / {
        root /static/react-app;
        try_files $uri $uri/ /index.html;
    }
}
