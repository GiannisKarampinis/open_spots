global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "postgres_exporter"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "redis_exporter"
    static_configs:
      - targets: ["redis_exporter:9121"]

  # Flower metrics: ΔΕΝ είναι πάντα διαθέσιμα by default.
  # Θα το κρατήσουμε σαν target, αλλά αν δεν εκθέτει /metrics, απλά δεν θα scrape-άρει.
  - job_name: "flower"
    metrics_path: /metrics
    static_configs:
      - targets: ["flower:5555"]